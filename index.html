<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Firebase</title>
</head>
<body>
  <h1>Login con Firebase</h1>

  <!-- Botón Google -->
  <button onclick="loginConGoogle()">Iniciar sesión con Google</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { firebaseConfig } from "./config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Función global para el botón
    window.loginConGoogle = async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        console.log("Usuario Google:", user);
        // Redirigir a la página de prueba
        window.location.href = "chat.html";
      } catch (error) {
        console.error("Error con Google Auth:", error);
        alert("Error al iniciar sesión");
      }
    };
  </script>
</body>
</html>
