<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login a Chat IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
    }

    .container {
      background: white;
      padding: 50px 30px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 420px;
      width: 90%;
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      margin-bottom: 20px;
      font-weight: 700;
      color: #333;
    }

    .login-text {
      margin-bottom: 20px;
      font-size: 16px;
      color: #666;
    }

    button {
      font-size: 16px;
      padding: 12px 20px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s ease;
      width: 100%;
      font-weight: 500;
    }

    .chat-btn {
      background-color: #4285F4;
      color: white;
    }
    .chat-btn:hover {
      background-color: #357ae8;
      transform: scale(1.03);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }

    .profile-btn {
      background-color: #555;
      color: white;
    }
    .profile-btn:hover {
      background-color: #333;
      transform: scale(1.03);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Login a Chat IA</h1>

    <div class="login-text">Iniciar sesión con Google</div>

    <!-- Botón Acceso a Chat -->
    <button class="chat-btn" onclick="loginConGoogle()">
      Acceso a Chat
    </button>

    <!-- Botón Volver a Perfil -->
    <button class="profile-btn" onclick="window.location.href='https://cv-daniel.onrender.com/'">
      Volver a Perfil Daniel
    </button>

    <div class="footer">© 2026 Daniel Portfolio</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { firebaseConfig } from "./config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.loginConGoogle = async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        console.log("Usuario Google:", user);
        window.location.href = "chat.html";
      } catch (error) {
        console.error("Error con Google Auth:", error);
        alert("Error al iniciar sesión");
      }
    };
  </script>
</body>
</html>
